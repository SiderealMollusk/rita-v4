---
- name: Sync ops-brain user kubeconfig from canonical control-plane source
  hosts: ops_brain
  become: true
  gather_facts: true

  tasks:
    - name: Require control-plane host address
      ansible.builtin.assert:
        that:
          - hostvars[inventory_hostname].ansible_host is defined
          - hostvars[inventory_hostname].ansible_host | length > 0
        fail_msg: "ops-brain inventory is missing ansible_host."

    - name: Ensure k3s admin kubeconfig exists
      ansible.builtin.stat:
        path: /etc/rancher/k3s/k3s.yaml
      register: ops_brain_k3s_kubeconfig

    - name: Require k3s admin kubeconfig
      ansible.builtin.assert:
        that:
          - ops_brain_k3s_kubeconfig.stat.exists
        fail_msg: "Missing /etc/rancher/k3s/k3s.yaml on ops-brain."

    - name: Ensure kubeconfig directory for ansible user
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0700"

    - name: Copy kubeconfig for ansible user
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "/home/{{ ansible_user }}/.kube/config"
        remote_src: true
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"

    - name: Rewrite kubeconfig server host to ops-brain inventory address
      ansible.builtin.lineinfile:
        path: "/home/{{ ansible_user }}/.kube/config"
        regexp: '^\s*server:'
        line: "    server: https://{{ hostvars[inventory_hostname].ansible_host }}:6443"

    - name: Set expected kubeconfig server line
      ansible.builtin.set_fact:
        ops_brain_expected_kubeconfig_server: "    server: https://{{ hostvars[inventory_hostname].ansible_host }}:6443"

    - name: Verify kubeconfig server host for ansible user
      ansible.builtin.command: grep '^    server:' /home/{{ ansible_user }}/.kube/config
      register: ops_brain_user_kubeconfig_server
      changed_when: false
      failed_when: ops_brain_user_kubeconfig_server.stdout != ops_brain_expected_kubeconfig_server
