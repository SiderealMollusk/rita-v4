---
- name: Install Helm on observatory
  hosts: observatory
  become: true
  gather_facts: true

  tasks:
    - name: Require helm_install_method var
      ansible.builtin.assert:
        that:
          - helm_install_method is defined
          - helm_install_method == 'script'
        fail_msg: "observatory currently supports helm_install_method=script only."

    - name: Require helm_install_script_url var
      ansible.builtin.assert:
        that:
          - helm_install_script_url is defined
          - helm_install_script_url | length > 0
        fail_msg: "Missing required var: helm_install_script_url (set it in ops/ansible/group_vars/observatory.yml)."

    - name: Install Helm if missing
      ansible.builtin.shell: |
        curl -fsSL {{ helm_install_script_url }} | bash
      args:
        creates: /usr/local/bin/helm

    - name: Verify Helm installation
      ansible.builtin.command: helm version --short
      changed_when: false
