---
- name: Apply 1Password SecretStore + ExternalSecret bridge
  hosts: vps
  become: true
  gather_facts: true

  vars:
    op_service_account_token: "{{ lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') }}"
    k3s_kubeconfig: /etc/rancher/k3s/k3s.yaml

  pre_tasks:
    - name: Require bridge vars
      ansible.builtin.assert:
        that:
          - eso_namespace is defined
          - eso_namespace | length > 0
          - op_vault_id is defined
          - op_vault_id | length > 0
          - test_secret_item is defined
          - test_secret_item | length > 0
          - test_secret_field is defined
          - test_secret_field | length > 0
          - test_secret_expected_value is defined
          - test_secret_expected_value | length > 0
        fail_msg: "Missing required vars in ops/ansible/group_vars/vps.yml for ESO bridge."

    - name: Require OP_SERVICE_ACCOUNT_TOKEN in environment
      ansible.builtin.assert:
        that:
          - op_service_account_token | length > 0
        fail_msg: "OP_SERVICE_ACCOUNT_TOKEN is not set in the Ansible execution environment."

  tasks:
    - name: Ensure namespace exists
      ansible.builtin.command: kubectl create namespace {{ eso_namespace }} --dry-run=client -o yaml
      register: ns_yaml
      changed_when: false
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Apply namespace manifest
      ansible.builtin.shell: kubectl apply -f -
      args:
        stdin: "{{ ns_yaml.stdout }}"
      changed_when: false
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Create/update op-token secret from service account token
      ansible.builtin.command: >-
        kubectl create secret generic op-token
        --namespace {{ eso_namespace }}
        --from-literal=token={{ op_service_account_token | quote }}
        --dry-run=client -o yaml
      register: op_token_yaml
      changed_when: false
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Apply op-token secret
      ansible.builtin.shell: kubectl apply -f -
      args:
        stdin: "{{ op_token_yaml.stdout }}"
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Render SecretStore manifest
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/0010-onepassword-store.yaml.j2"
        dest: /tmp/0010-onepassword-store.yaml
        mode: "0644"

    - name: Render ExternalSecret manifest
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/0020-test-secret.yaml.j2"
        dest: /tmp/0020-test-secret.yaml
        mode: "0644"

    - name: Apply SecretStore manifest
      ansible.builtin.command: kubectl apply -f /tmp/0010-onepassword-store.yaml
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Apply ExternalSecret manifest
      ansible.builtin.command: kubectl apply -f /tmp/0020-test-secret.yaml
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Wait for SecretStore Ready
      ansible.builtin.shell: |
        kubectl get secretstore onepassword-store -n {{ eso_namespace }} \
          -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' | grep -q '^True$'
      register: ss_ready
      retries: 30
      delay: 5
      until: ss_ready.rc == 0
      changed_when: false
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Wait for ExternalSecret Ready
      ansible.builtin.shell: |
        kubectl get externalsecret lab-test-sync -n {{ eso_namespace }} \
          -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' | grep -q '^True$'
      register: es_ready
      retries: 30
      delay: 5
      until: es_ready.rc == 0
      changed_when: false
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Verify decoded secret value
      ansible.builtin.shell: |
        kubectl get secret rita-test-k8s-secret -n {{ eso_namespace }} \
          -o jsonpath='{.data.my-test-value}' | base64 -d
      register: decoded_secret
      changed_when: false
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Assert decoded secret is expected
      ansible.builtin.assert:
        that:
          - decoded_secret.stdout == test_secret_expected_value
        fail_msg: "Decoded secret mismatch. Expected '{{ test_secret_expected_value }}', got '{{ decoded_secret.stdout }}'."
