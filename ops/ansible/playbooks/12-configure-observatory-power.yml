---
- name: Configure observatory no-sleep power policy
  hosts: observatory
  become: true
  gather_facts: true

  tasks:
    - name: Require observatory_disable_sleep var
      ansible.builtin.assert:
        that:
          - observatory_disable_sleep is defined
        fail_msg: "Missing required var: observatory_disable_sleep (set it in ops/ansible/group_vars/observatory.yml)."

    - name: Ensure logind drop-in directory exists
      ansible.builtin.file:
        path: /etc/systemd/logind.conf.d
        state: directory
        mode: "0755"
      when: observatory_disable_sleep | bool

    - name: Configure lid-close and idle actions to do nothing
      ansible.builtin.copy:
        dest: /etc/systemd/logind.conf.d/rita-no-sleep.conf
        mode: "0644"
        content: |
          [Login]
          HandleLidSwitch=ignore
          HandleLidSwitchExternalPower=ignore
          HandleLidSwitchDocked=ignore
          IdleAction=ignore
      when: observatory_disable_sleep | bool
      notify: Restart systemd-logind

    - name: Mask sleep-related targets
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        masked: true
        enabled: false
      loop:
        - sleep.target
        - suspend.target
        - hibernate.target
        - hybrid-sleep.target
        - suspend-then-hibernate.target
      when: observatory_disable_sleep | bool

  handlers:
    - name: Restart systemd-logind
      ansible.builtin.service:
        name: systemd-logind
        state: restarted
