---
- name: Label observatory node
  hosts: observatory
  become: true
  gather_facts: true

  tasks:
    - name: Require observatory_k3s_role_label var
      ansible.builtin.assert:
        that:
          - observatory_k3s_role_label is defined
          - observatory_k3s_role_label | length > 0
        fail_msg: "Missing required var: observatory_k3s_role_label (set it in ops/ansible/group_vars/observatory.yml)."

    - name: Get node name
      ansible.builtin.command: kubectl get nodes -o jsonpath={.items[0].metadata.name}
      register: k3s_node_name
      changed_when: false

    - name: Label node as observatory
      ansible.builtin.command: kubectl label node {{ k3s_node_name.stdout }} {{ observatory_k3s_role_label }} --overwrite
      changed_when: true
