---
- name: Install k3s control plane on observatory
  hosts: observatory
  become: true
  gather_facts: true

  tasks:
    - name: Require k3s_channel var
      ansible.builtin.assert:
        that:
          - k3s_channel is defined
          - k3s_channel | length > 0
        fail_msg: "Missing required var: k3s_channel (set it in ops/ansible/group_vars/observatory.yml)."

    - name: Install k3s if missing
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_CHANNEL={{ k3s_channel }} sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Ensure k3s service is enabled and running
      ansible.builtin.service:
        name: k3s
        enabled: true
        state: started

    - name: Wait for node to become Ready
      ansible.builtin.shell: |
        kubectl get nodes --no-headers | awk '{print $2}' | grep -q 'Ready'
      register: k3s_ready
      retries: 30
      delay: 5
      until: k3s_ready.rc == 0
      changed_when: false

    - name: Ensure kubeconfig directory for ansible user
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0700"

    - name: Copy kubeconfig for ansible user
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "/home/{{ ansible_user }}/.kube/config"
        remote_src: true
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"

    - name: Rewrite kubeconfig server host to observatory inventory address
      ansible.builtin.lineinfile:
        path: "/home/{{ ansible_user }}/.kube/config"
        regexp: '^\s*server:'
        line: "    server: https://{{ hostvars[inventory_hostname].ansible_host }}:6443"

    - name: Set expected kubeconfig server line
      ansible.builtin.set_fact:
        observatory_expected_kubeconfig_server: "    server: https://{{ hostvars[inventory_hostname].ansible_host }}:6443"

    - name: Verify kubeconfig server host for ansible user
      ansible.builtin.command: grep '^    server:' /home/{{ ansible_user }}/.kube/config
      register: observatory_user_kubeconfig_server
      changed_when: false
      failed_when: observatory_user_kubeconfig_server.stdout != observatory_expected_kubeconfig_server
