---
- name: Apply 1Password secret bridge on internal k3s
  hosts: observatory
  become: true
  gather_facts: true

  vars:
    op_service_account_token: "{{ lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') }}"
    k3s_kubeconfig: /etc/rancher/k3s/k3s.yaml
    cluster_store_manifest_src: "{{ playbook_dir }}/../../gitops/platform/sources/onepassword-cluster-store.yaml"
    cluster_store_manifest_dst: "/tmp/onepassword-cluster-store.yaml"

  pre_tasks:
    - name: Require internal secret bridge vars
      ansible.builtin.assert:
        that:
          - eso_namespace is defined
          - eso_namespace | length > 0
        fail_msg: "Missing required var: eso_namespace (set it in ops/ansible/group_vars/observatory.yml)."

    - name: Require OP_SERVICE_ACCOUNT_TOKEN in environment
      ansible.builtin.assert:
        that:
          - op_service_account_token | length > 0
        fail_msg: "OP_SERVICE_ACCOUNT_TOKEN is not set in the Ansible execution environment."

  tasks:
    - name: Ensure external-secrets namespace exists
      ansible.builtin.command: kubectl create namespace {{ eso_namespace }} --dry-run=client -o yaml
      register: ns_yaml
      changed_when: false
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Apply external-secrets namespace manifest
      ansible.builtin.shell: kubectl apply -f -
      args:
        stdin: "{{ ns_yaml.stdout }}"
      changed_when: false
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Create or update op-token secret manifest
      ansible.builtin.command: >-
        kubectl create secret generic op-token
        --namespace {{ eso_namespace }}
        --from-literal=token={{ op_service_account_token | quote }}
        --dry-run=client -o yaml
      register: op_token_yaml
      changed_when: false
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Apply op-token secret
      ansible.builtin.shell: kubectl apply -f -
      args:
        stdin: "{{ op_token_yaml.stdout }}"
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Copy canonical ClusterSecretStore manifest to observatory
      ansible.builtin.copy:
        src: "{{ cluster_store_manifest_src }}"
        dest: "{{ cluster_store_manifest_dst }}"
        mode: "0644"

    - name: Apply canonical ClusterSecretStore manifest
      ansible.builtin.command: kubectl apply -f {{ cluster_store_manifest_dst }}
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Wait for ClusterSecretStore Ready
      ansible.builtin.shell: |
        kubectl get clustersecretstore onepassword-cluster-store \
          -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' | grep -q '^True$'
      register: cluster_store_ready
      retries: 30
      delay: 5
      until: cluster_store_ready.rc == 0
      changed_when: false
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"
