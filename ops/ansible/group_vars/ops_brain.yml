ops_brain_public_ip: "{{ hostvars[inventory_hostname].ansible_host }}"

ops_brain_k3s_role_label: "rita.role=ops-brain"
ops_brain_disable_sleep: true

k3s_channel: "stable"
helm_install_method: "script"
helm_install_script_url: "https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3"

pangolin_newt_namespace: "newt"
pangolin_newt_release_name: "ops-brain-newt"
pangolin_newt_secret_name: "newt-cred"
pangolin_newt_helm_repo_name: "fossorial"
pangolin_newt_helm_repo_url: "https://charts.fossorial.io"
pangolin_newt_helm_chart: "fossorial/newt"
pangolin_newt_helm_timeout: "10m"
pangolin_newt_values_file: "ops/helm/newt/values.ops-brain.yaml"
pangolin_newt_credentials_vault_id: "5vr4hef2746tpplvjx424xafvu"
pangolin_newt_site_slug: "ops_brain"
pangolin_newt_site_name: "ops-brain"
pangolin_newt_credentials_item_prefix: "pangolin_site_"
pangolin_newt_credentials_item: "pangolin_site_ops_brain"
pangolin_newt_id_min_length: "10"
pangolin_newt_secret_min_length: "24"

monitoring_namespace: "monitoring"
monitoring_helm_timeout: "15m"

monitoring_kube_prometheus_release_name: "ops-brain-kube-prometheus"
monitoring_kube_prometheus_repo_name: "prometheus-community"
monitoring_kube_prometheus_repo_url: "https://prometheus-community.github.io/helm-charts"
monitoring_kube_prometheus_chart: "prometheus-community/kube-prometheus-stack"
monitoring_kube_prometheus_values_file: "ops/helm/monitoring/kube-prometheus-stack.values.yaml"

monitoring_loki_release_name: "ops-brain-loki"
monitoring_loki_repo_name: "grafana"
monitoring_loki_repo_url: "https://grafana.github.io/helm-charts"
monitoring_loki_chart: "grafana/loki"
monitoring_loki_values_file: "ops/helm/monitoring/loki.values.yaml"

monitoring_promtail_release_name: "ops-brain-promtail"
monitoring_promtail_repo_name: "grafana"
monitoring_promtail_repo_url: "https://grafana.github.io/helm-charts"
monitoring_promtail_chart: "grafana/promtail"
monitoring_promtail_values_file: "ops/helm/monitoring/promtail.values.yaml"
