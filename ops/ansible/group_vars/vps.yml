# Shared vars for all hosts in the [vps] inventory group.
# Keep host identity/IP in inventory; reference it here for templates/manifests.

public_ip: "{{ hostvars[inventory_hostname].ansible_host }}"

# Update when domain is finalized.
pangolin_domain: "pangolin.virgil.info"
pangolin_endpoint: "https://{{ pangolin_domain }}"

# Optional explicit advertise IP for templates that require it.
pangolin_advertise_ip: "{{ public_ip }}"

# Pangolin server runtime/install paths
pangolin_install_dir: "/opt/pangolin"
pangolin_installer_url: "https://static.pangolin.net/get-installer.sh"
docker_compose_version: "v2.39.1"

# VPS security maintenance baseline.
vps_ssh_allowed_users:
  - virgil

# Public service exposure expected on main-vps.
vps_public_tcp_ports:
  - 80
  - 443

vps_public_udp_ports:
  - 51820
  - 21820

# fail2ban policy for sshd jail.
vps_fail2ban_bantime: "1h"
vps_fail2ban_findtime: "10m"
vps_fail2ban_maxretry: 5
