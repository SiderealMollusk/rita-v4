apiVersion: v1
kind: ConfigMap
metadata:
  name: nextcloud-edge-nginx
data:
  default.conf: |
    map $http_upgrade $connection_upgrade {
      default upgrade;
      '' close;
    }

    upstream nextcloud_upstream {
      server nextcloud.workload.svc.cluster.local:8080;
    }

    upstream nextcloud_exapps_upstream {
      server nextcloud-appapi-harp.workload.svc.cluster.local:8780;
    }

    server {
      listen 8080;
      server_name _;

      proxy_http_version 1.1;
      proxy_read_timeout 1800s;
      proxy_send_timeout 1800s;
      client_max_body_size 10G;

      location /exapps/ {
        proxy_pass http://nextcloud_exapps_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
      }

      location / {
        proxy_pass http://nextcloud_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
      }
    }
