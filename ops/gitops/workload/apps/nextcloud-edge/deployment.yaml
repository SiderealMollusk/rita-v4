apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud-edge
  labels:
    app.kubernetes.io/name: nextcloud-edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nextcloud-edge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nextcloud-edge
        rita.service/name: nextcloud-edge
        rita.service/tier: collaboration
    spec:
      nodeSelector:
        rita.role: workload
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: nextcloud-edge-nginx
