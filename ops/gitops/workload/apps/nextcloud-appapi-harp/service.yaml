apiVersion: v1
kind: Service
metadata:
  name: nextcloud-appapi-harp
  labels:
    app.kubernetes.io/name: nextcloud-appapi-harp
spec:
  selector:
    app.kubernetes.io/name: nextcloud-appapi-harp
  ports:
    - name: http
      port: 8780
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: nextcloud-appapi-harp-frp
  labels:
    app.kubernetes.io/name: nextcloud-appapi-harp
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: nextcloud-appapi-harp
  ports:
    - name: frp
      port: 8782
      targetPort: frp
      nodePort: 30782
