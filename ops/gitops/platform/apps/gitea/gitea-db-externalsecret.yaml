apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-db-secret
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster-store
    kind: ClusterSecretStore
  target:
    name: gitea-db-secret
    creationPolicy: Owner
  data:
    - secretKey: db-password
      remoteRef:
        key: "platform/postgres/gitea-password"
