apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: platform-postgres
  namespace: platform
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: bitnami-postgresql
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Temporary mitigation for Bitnami's free versioned image deprecation.
    # Revisit before expanding platform-postgres usage or hardening backups.
    image:
      registry: docker.io
      repository: bitnamilegacy/postgresql
    global:
      security:
        allowInsecureImages: true
    fullnameOverride: platform-postgres
    auth:
      enablePostgresUser: true
      existingSecret: platform-postgres-auth
      secretKeys:
        adminPasswordKey: postgres-password
    architecture: standalone
    primary:
      persistence:
        enabled: true
        storageClass: local-path
        size: 20Gi
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1
          memory: 2Gi
      nodeSelector:
        rita.role: platform
      podLabels:
        rita.service/name: platform-postgres
        rita.service/tier: data
        rita.observability/logs: "true"
        rita.backup/stateful: "true"
      initdb:
        scripts:
          00-platform-postgres-readme.sql: |
            -- Shared platform Postgres base instance.
            -- App-specific databases/users should be created deliberately later,
            -- not implicitly by the base service bootstrap.
    metrics:
      enabled: true
      image:
        registry: docker.io
        repository: bitnamilegacy/postgres-exporter
      serviceMonitor:
        enabled: true
        namespace: monitoring
        labels:
          release: ops-brain-kube-prometheus
