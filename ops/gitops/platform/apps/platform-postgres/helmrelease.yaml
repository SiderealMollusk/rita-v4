apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: platform-postgres
  namespace: platform
spec:
  interval: 30m
  chart:
    spec:
      chart: postgresql
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      version: "16.*"
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    fullnameOverride: platform-postgres
    auth:
      enablePostgresUser: true
      username: gitea
      database: gitea
      existingSecret: platform-postgres-auth
      secretKeys:
        adminPasswordKey: postgres-password
        userPasswordKey: password
    architecture: standalone
    primary:
      persistence:
        enabled: true
        storageClass: local-path
        size: 20Gi
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1
          memory: 2Gi
      nodeSelector:
        rita.role: platform
      podLabels:
        rita.service/name: platform-postgres
        rita.service/tier: data
        rita.observability/logs: "true"
        rita.backup/stateful: "true"
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: monitoring
        labels:
          release: ops-brain-kube-prometheus
