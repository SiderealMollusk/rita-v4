apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: platform-postgres-auth
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster-store
    kind: ClusterSecretStore
  target:
    name: platform-postgres-auth
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef:
        key: "platform-postgres/postgres-password"
