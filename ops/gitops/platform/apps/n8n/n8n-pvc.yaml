apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-data
  namespace: platform
  labels:
    rita.service/name: n8n
    rita.service/tier: automation
    rita.observability/logs: "true"
    rita.backup/stateful: "true"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
