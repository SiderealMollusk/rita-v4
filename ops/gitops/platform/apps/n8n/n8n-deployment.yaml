apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: platform
  labels:
    rita.service/name: n8n
    rita.service/tier: automation
    rita.observability/logs: "true"
    rita.observability/probe: "http"
    rita.backup/stateful: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n
        rita.service/name: n8n
        rita.service/tier: automation
        rita.observability/logs: "true"
        rita.observability/probe: "http"
        rita.backup/stateful: "true"
    spec:
      nodeSelector:
        rita.role: workload
        kubernetes.io/hostname: n8n
      containers:
        - name: n8n
          image: docker.n8n.io/n8nio/n8n:2.7.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5678
          env:
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              value: platform-postgres.platform.svc.cluster.local
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: n8n
            - name: DB_POSTGRESDB_USER
              value: n8n
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: db-password
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: encryption-key
            - name: N8N_PORT
              value: "5678"
            - name: N8N_LISTEN_ADDRESS
              value: 0.0.0.0
            - name: N8N_RUNNERS_ENABLED
              value: "true"
            - name: N8N_METRICS
              value: "true"
            - name: GENERIC_TIMEZONE
              value: America/Los_Angeles
            - name: TZ
              value: America/Los_Angeles
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: n8n-data
