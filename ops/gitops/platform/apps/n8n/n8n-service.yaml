apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: platform
  labels:
    rita.service/name: n8n
    rita.service/tier: automation
    rita.observability/probe: "http"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: n8n
  ports:
    - name: http
      port: 5678
      targetPort: http
