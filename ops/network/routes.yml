# Public/edge route catalog (non-secret).
# Source of truth for externally hittable domains and exposure intent.

pangolin_domain: "pangolin.virgil.info"
pangolin_endpoint: "https://pangolin.virgil.info"

routes:
  - name: "pangolin-server"
    fqdn: "pangolin.virgil.info"
    backend: "main-vps"
    exposure: "public"
    ports:
      - 80
      - 443
    notes: "Primary Pangolin server endpoint."
  - name: "ops-brain-grafana"
    fqdn: "grafana.virgil.info"
    backend: "ops-brain"
    exposure: "pangolin"
    ports:
      - 80
    notes: "Pangolin-routed Grafana resource targeting the ops-brain monitoring cluster."
  - name: "ops-brain-prometheus"
    fqdn: "prometheus.virgil.info"
    backend: "ops-brain"
    exposure: "pangolin"
    ports:
      - 9090
    notes: "Pangolin-routed Prometheus resource targeting the ops-brain monitoring cluster."
  - name: "ops-brain-alertmanager"
    fqdn: "alertmanager.virgil.info"
    backend: "ops-brain"
    exposure: "pangolin"
    ports:
      - 9093
    notes: "Pangolin-routed Alertmanager resource targeting the ops-brain monitoring cluster."
  - name: "ops-brain-uptime-kuma"
    fqdn: "uptime.virgil.info"
    backend: "ops-brain"
    exposure: "pangolin"
    ports:
      - 80
    notes: "Pangolin-routed Uptime Kuma resource targeting the ops-brain monitoring cluster."
  - name: "workload-nextcloud"
    fqdn: "app.virgil.info"
    backend: "workload"
    exposure: "pangolin"
    ports:
      - 80
    notes: "Pangolin should target nextcloud-edge.workload.svc.cluster.local:8080 so /exapps/ routes to HaRP while all other paths continue to Nextcloud."
