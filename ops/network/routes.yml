# Public/edge route catalog (non-secret).
# Source of truth for externally hittable domains and exposure intent.

pangolin_domain: "pangolin.virgil.info"
pangolin_endpoint: "https://pangolin.virgil.info"

routes:
  - name: "pangolin-server"
    fqdn: "pangolin.virgil.info"
    backend: "main-vps"
    exposure: "public"
    ports:
      - 80
      - 443
    notes: "Primary Pangolin server endpoint."
  - name: "observatory-grafana"
    fqdn: "grafana.virgil.info"
    backend: "observatory"
    exposure: "pangolin"
    ports:
      - 80
    notes: "Pangolin-routed Grafana resource targeting the observatory monitoring cluster."
  - name: "observatory-prometheus"
    fqdn: "prometheus.virgil.info"
    backend: "observatory"
    exposure: "pangolin"
    ports:
      - 9090
    notes: "Pangolin-routed Prometheus resource targeting the observatory monitoring cluster."
  - name: "observatory-alertmanager"
    fqdn: "alertmanager.virgil.info"
    backend: "observatory"
    exposure: "pangolin"
    ports:
      - 9093
    notes: "Pangolin-routed Alertmanager resource targeting the observatory monitoring cluster."
  - name: "observatory-uptime-kuma"
    fqdn: "uptime.virgil.info"
    backend: "observatory"
    exposure: "pangolin"
    ports:
      - 80
    notes: "Pangolin-routed Uptime Kuma resource targeting the observatory monitoring cluster."
  - name: "workload-nextcloud"
    fqdn: "app.virgil.info"
    backend: "workload"
    exposure: "pangolin"
    ports:
      - 80
    notes: "Pangolin should target nextcloud-edge.workload.svc.cluster.local:8080 so /exapps/ routes to HaRP while all other paths continue to Nextcloud."
  - name: "nextcloud-core-vm"
    fqdn: "cloud.virgil.info"
    backend: "nextcloud-core"
    exposure: "pangolin"
    ports:
      - 80
    notes: "Temporary validation route for the dedicated nextcloud-core VM at 192.168.6.183:80 before decommissioning the older app.virgil.info path."
  - name: "workload-n8n"
    fqdn: "n8n.virgil.info"
    backend: "n8n-vm"
    exposure: "pangolin"
    ports:
      - 5678
    notes: "Pangolin-routed n8n route via n8n-vm Newt connector, targeting the platform n8n service ClusterIP 10.43.171.251:5678."
